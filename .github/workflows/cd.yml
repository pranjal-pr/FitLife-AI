name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are missing. Skipping deployment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend deployment
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend to production
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-huggingface:
    name: Deploy Native Gradio App to Hugging Face
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check Hugging Face configuration
        id: hf-secrets
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_REPO" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "HF_TOKEN or HF_SPACE_REPO is missing. Skipping deployment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Gradio Space bundle
        if: steps.hf-secrets.outputs.ready == 'true'
        run: |
          mkdir -p hf-space
          cp gradio_app.py hf-space/app.py
          cp requirements-gradio.txt hf-space/requirements.txt
          cp docs/HUGGINGFACE_GRADIO_README.md hf-space/README.md
          cp LICENSE hf-space/LICENSE
          cp -r gateway hf-space/gateway
          cp -r services hf-space/services
          mkdir -p hf-space/data
          cp -r data/nutri-ai hf-space/data/nutri-ai
          mkdir -p hf-space/model
          cp -r model/models hf-space/model/models

      - name: Install Hugging Face Hub client
        if: steps.hf-secrets.outputs.ready == 'true'
        run: |
          python -m pip install --upgrade huggingface_hub

      - name: Verify Hugging Face authentication
        if: steps.hf-secrets.outputs.ready == 'true'
        run: hf auth whoami

      - name: Upload directly to existing Hugging Face Space
        if: steps.hf-secrets.outputs.ready == 'true'
        run: |
          python - <<'PY'
          import os

          from huggingface_hub import HfApi

          repo_id = os.environ["HF_SPACE_REPO"]
          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)

          try:
              space = api.repo_info(
                  repo_id=repo_id,
                  repo_type="space",
                  token=token,
              )
              print(f"Uploading to existing Gradio Space: {space.id}")

              result = api.upload_folder(
                  repo_id=repo_id,
                  repo_type="space",
                  folder_path="hf-space",
                  path_in_repo=".",
                  delete_patterns="*",
                  commit_message=(
                      "Deploy native Gradio app from GitHub Actions "
                      f"({os.environ['GITHUB_SHA']})"
                  ),
                  token=token,
              )
              print(f"Space updated: {result.commit_url}")
          except Exception as exc:
              message = str(exc).replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::error title=Hugging Face upload failed::{message}")
              raise
          PY
